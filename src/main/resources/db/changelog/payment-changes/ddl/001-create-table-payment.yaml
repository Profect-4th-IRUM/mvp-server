databaseChangeLog:
  - changeSet:
      id: create-table-1-payment
      author: hyeonji91
      comment: "p_payment 테이블 생성 및 기본 컬럼 정의"
      changes:
        - createTable:
            tableName: p_payment
            columns:
              - column:
                  name: payment_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(20)
              - column:
                  name: amount
                  type: INT
              - column:
                  name: total_discount_amount
                  type: INT
              - column:
                  name: toss_payment_key
                  type: VARCHAR(255)
              - column:
                  name: toss_order_id
                  type: VARCHAR(255)
              - column:
                  name: payment_status
                  type: VARCHAR(20)
              - column:
                  name: payment_corp
                  type: VARCHAR(20)
              - column:
                  name: member_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamp WITH TIME ZONE
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted_by
                  type: BIGINT
              - addForeignKeyConstraint:
                  baseTableName: p_payment
                  baseColumnNames: member_id
                  referencedTableName: p_member
                  referencedColumnNames: member_id
                  constraintName: fk_payment_on_member
      rollback:
        - dropTable:
            tableName: p_payment



